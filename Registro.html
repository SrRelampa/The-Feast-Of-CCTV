<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - The Feast Of CCTV</title>
  <link rel="stylesheet" href="estilos.css">
  <style>
    .form-container {
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(106, 78, 156, 0.15);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--lavanda-fuerte);
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--lavanda-claro);
      border-radius: 6px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--lavanda-medio);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, var(--lavanda-fuerte), var(--lavanda-medio));
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
    }

    button:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <div class="kyamo">
    <div class="left">
      <img src="Img/Logo.png" class="logo">
      <h2 class="brand-name">The Feast Of CCTV</h2>
    </div>

    <ul class="main-menu">
      <li><a href="index.html">Inicio</a></li>

      <li class="has-submenu">
        <span class="parent-title">Información</span>
        <ul class="submenu">
          <li><a href="Personajes.html">Personajes</a></li>
          <li><a href="powerups.html">Power Ups</a></li>
          <li><a href="comojugar.html">¿Cómo jugar?</a></li>
        </ul>
      </li>

      <li><a href="Registro.html">Registros</a></li>
    </ul>
  </div>

  <section class="main-content">
    <div class="form-container">
      <h1 style="text-align: center; color: var(--lavanda-fuerte);">Registro de Jugadores</h1>
      <form>
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico:</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="usuario">Nombre de Usuario:</label>
          <input type="text" id="usuario" name="usuario" required>
        </div>

        <div class="form-group">
          <label for="contraseña">Contraseña:</label>
          <input type="password" id="contraseña" name="contraseña" required>
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje (Opcional):</label>
          <textarea id="mensaje" name="mensaje" rows="4"></textarea>
        </div>

        <button type="submit">Registrarse</button>
      </form>
    </div>
  </section>

  <section>
    <footer class="site-footer">
      <div class="footer-wrapper" style="display: flex; justify-content: space-between;">
        <div class="footer-column left">
          <img src="img/Logo.png" alt="The Feast Of CCTV" class="footer-logo">         
          <div class="contact-info">
            <h4>CONTACTO</h4>
            <p><span class="icon">📞</span> 6692239261</p>
            <p><span class="icon">✉️</span> contacto@thefeastofcctv.com</p>
          </div>
        </div>

        <div class="footer-column right">
          <h4>REDES SOCIALES</h4>
          <div class="social-icons">
            <a href="https://x.com" target="_blank">
              <img src="imagenes/social/X-Twitter.png" alt="X">
            </a>
            <a href="https://instagram.com/" target="_blank">
              <img src="imagenes/social/Instagram.png" alt="Instagram">
            </a>
            <a href="https://tiktok.com/" target="_blank">
              <img src="imagenes/social/TikTok.png" alt="TikTok">
            </a>
            <a href="https://youtube.com/" target="_blank">
              <img src="imagenes/social/YouTube.png" alt="YouTube">
            </a>
          </div>
        </div>
      </div>

      <div class="footer-bottom">
        © 2026 The Feast Of CCTV
      </div>
    </footer>
  </section>

</body>
</html>
