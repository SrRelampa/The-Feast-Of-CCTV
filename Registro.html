  <header class="kyamo">
    <div class="left">
      <img src="Img/Logo_Empresa.png" class="logo" alt="Logo CCTV Studios">
      <h2 class="brand-name">CCTV Corporation</h2>

    <nav>

        <li><a href="Registro.html">Registro</a></li>
      </ul>
    </nav>
  </header>

  <main class="content-wrapper">
    <div class="contenedor-registro">
      <div class="header-registro">
        <img src="Img/Logo-Juego.png" alt="Logo" class="mini-logo">
        <h1>Únete a la Beta</h1>
        <p class="subtitle">¡Sé de los primeros en probar la experiencia!</p>
      </div>

      <form action="procesar_registro.php" method="POST">
        <div class="campo">
          <label>Gamertag (Apodo):</label>
          <input type="text" name="gamertag" placeholder="Ej: GuerreroCCTV" required>
        </div>

        <div class="campo">
          <label>Correo Electrónico:</label>
          <input type="email" name="email" placeholder="tu@correo.com" required>
        </div>

        <div class="campo">
          <label>Contraseña:</label>
          <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
        </div>

        <div class="campo">
          <label>Plataforma Preferida:</label>
          <select name="platform" required>
            <option value="">Selecciona una opción</option>
            <option value="pc">PC</option>
            <option value="mobile">Mobile</option>
          </select>
        </div>

        <div class="campo">
          <label>¿Cómo prefieres jugar?</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="modo[]" value="solo"> Solo</label>
            <label class="checkbox-item"><input type="checkbox" name="modo[]" value="coop"> Coop</label>
            <label class="checkbox-item"><input type="checkbox" name="modo[]" value="pvp"> PvP</label>
          </div>
        </div>

        <button type="submit" class="boton-enviar">Registrarse Ahora</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-wrapper">
