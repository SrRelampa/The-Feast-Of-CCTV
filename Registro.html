<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - CCTV</title>
  <link rel="stylesheet" href="Css/estilos.css">
  <link rel="stylesheet" href="Css/registro.css">
</head>
<body style="background-color: #f9f9fb;"> <header class="kyamo">
    </header>

  <main class="content-wrapper">
    <div class="contenedor-registro">
      <div class="header-registro">
        <h1>Únete a la Beta</h1>
        <p class="subtitle">Sé de los primeros en probar la experiencia</p>
      </div>

      <form action="procesar_registro.php" method="POST">
        <div class="campo">
          <label>Gamertag:</label>
          <input type="text" name="gamertag" placeholder="Ej: GuerreroCCTV" required>
        </div>

        <div class="campo">
          <label>Correo Electrónico:</label>
          <input type="email" name="email" placeholder="tu@correo.com" required>
        </div>

        <div class="campo">
          <label>¿Cómo prefieres jugar?</label>
          <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" name="modo[]" value="solo"> Solo
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="modo[]" value="coop"> Coop
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="modo[]" value="pvp"> PvP
            </label>
          </div>
        </div>

        <button type="submit" class="boton-enviar">Registrarse Ahora</button>
      </form>
    </div>
  </main>

  </body>
</html>
