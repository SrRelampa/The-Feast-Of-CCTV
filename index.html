<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - The Feast Of CCTV</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <div class="kyamo">
    <div class="left">
      <img src="Img/Logo.png" class="logo">
      <h2 class="brand-name">The Feast Of CCTV</h2>
    </div>

    <ul class="main-menu">
      <li><a href="index.html">Inicio</a></li>
      <li class="has-submenu">
        <span class="parent-title">Información</span>
        <ul class="submenu">
          <li><a href="Personajes.html">Personajes</a></li>
          <li><a href="powerups.html">Power Ups</a></li>
          <li><a href="comojugar.html">¿Cómo jugar?</a></li>
        </ul>
      </li>
      <li><a href="Registro.html">Registros</a></li>
    </ul>
  </div>

  <main class="content-wrapper">
    <div class="contenedor-registro">
      <div class="header-registro">
        <img src="Img/Logo.png" alt="Logo" class="mini-logo">
        <h1>Únete a la Beta</h1>
        <p class="subtitle">¡Sé de los primeros en jugar The Feast Of CCTV!</p>
      </div>

      <hr class="separador">

      <form action="#" method="POST">
        <div class="campo">
          <label>Gamertag (Apodo):</label>
          <input type="text" name="gamertag" placeholder="Tu nombre de jugador" required>
        </div>

        <div class="campo">
          <label>Correo Electrónico:</label>
          <input type="email" name="email" placeholder="tu-correo@ejemplo.com" required>
        </div>

        <div class="campo">
          <label>Contraseña:</label>
          <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
        </div>

        <div class="campo">
          <label>Plataforma Preferida:</label>
          <select name="platform" required>
            <option value="">Selecciona una plataforma</option>
            <option value="pc">PC</option>
            <option value="ps5">PlayStation 5</option>
            <option value="xbox">Xbox Series X/S</option>
            <option value="mobile">Mobile</option>
          </select>
        </div>

        <div class="campo">
          <label>¿Cómo prefieres jugar?</label>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="solo" name="modo" value="solo">
              <label for="solo">Solo</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="coop" name="modo" value="cooperativo">
              <label for="coop">Cooperativo</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="pvp" name="modo" value="pvp">
              <label for="pvp">PvP</label>
            </div>
          </div>
        </div>

        <div class="campo">
          <label>
            <input type="checkbox" name="terminos" required>
            Acepto los términos y condiciones de la beta
          </label>
        </div>

        <button type="submit" class="boton-enviar">Registrarse en la Beta</button>
      </form>
    </div>
  </main>

  <footer>
    <footer class="site-footer">
      <div class="footer-wrapper">
        <div class="footer-column left">
          <img src="img/Logo.png" alt="The Feast Of CCTV" class="footer-logo">         
          <div class="contact-info">
            <h4>CONTACTO</h4>
            <p><span class="icon">📞</span> 6692239261</p>
            <p><span class="icon">✉️</span> contacto@thefeastofcctv.com</p>
          </div>
        </div>

        <div class="footer-column right">
          <h4>REDES SOCIALES</h4>
          <div class="social-icons">
            <a href="https://x.com" target="_blank">
              <img src="imagenes/social/X-Twitter.png" alt="X">
            </a>
            <a href="https://instagram.com/" target="_blank">
              <img src="imagenes/social/Instagram.png" alt="Instagram">
            </a>
            <a href="https://tiktok.com/" target="_blank">
              <img src="imagenes/social/TikTok.png" alt="TikTok">
            </a>
            <a href="https://youtube.com/" target="_blank">
              <img src="imagenes/social/YouTube.png" alt="YouTube">
            </a>
          </div>
        </div>
      </div>

      <div class="footer-bottom">
        © 2026 The Feast Of CCTV
      </div>
    </footer>
  </footer>

</body>
</html>
